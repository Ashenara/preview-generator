name: Generate Previews (Shard 0)

on:
  workflow_dispatch:

jobs:
  run-shard-0:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        run: |
          pnpm install

      - name: Create Env File
        run: |
          echo "CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" > .env.local
          echo "CLOUDFLARE_DATABASE_ID=${{ secrets.CLOUDFLARE_DATABASE_ID }}" >> .env.local
          echo "CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}" >> .env.local
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env.local
          echo "GEMINI_API_KEY_2=${{ secrets.GEMINI_API_KEY_2 }}" >> .env.local
          echo "GEMINI_API_KEY_3=${{ secrets.GEMINI_API_KEY_3 }}" >> .env.local
          echo "GEMINI_API_KEY_4=${{ secrets.GEMINI_API_KEY_4 }}" >> .env.local
          echo "GEMINI_API_KEY_5=${{ secrets.GEMINI_API_KEY_5 }}" >> .env.local
          echo "GEMINI_API_KEY_6=${{ secrets.GEMINI_API_KEY_6 }}" >> .env.local
          echo "GEMINI_API_KEY_7=${{ secrets.GEMINI_API_KEY_7 }}" >> .env.local
          echo "GEMINI_API_KEY_8=${{ secrets.GEMINI_API_KEY_8 }}" >> .env.local
          echo "GEMINI_API_KEY_9=${{ secrets.GEMINI_API_KEY_9 }}" >> .env.local
          echo "R2_PUBLIC_DOMAIN=${{ secrets.R2_PUBLIC_DOMAIN }}" >> .env.local
          echo "R2_RECEIPT_PUBLIC_DOMAIN=${{ secrets.R2_RECEIPT_PUBLIC_DOMAIN }}" >> .env.local
          echo "POLLINATIONS_API_KEY=${{ secrets.POLLINATIONS_API_KEY }}" >> .env.local
        working-directory: ./

      - name: Run Shard 0 Batch (Limit 1)
        run: |
          pnpm run batch-generate --shard 0 --total-shards 2 --limit 1 --privacy public
        working-directory: ./
        env:
          YOUTUBE_CREDS_JSON: ${{ secrets.YOUTUBE_CREDS_JSON }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID_2: ${{ secrets.YOUTUBE_CLIENT_ID_2 }}
          YOUTUBE_CLIENT_SECRET_2: ${{ secrets.YOUTUBE_CLIENT_SECRET_2 }}
          YOUTUBE_REFRESH_TOKEN_2: ${{ secrets.YOUTUBE_REFRESH_TOKEN_2 }}
          YOUTUBE_CLIENT_ID_3: ${{ secrets.YOUTUBE_CLIENT_ID_3 }}
          YOUTUBE_CLIENT_SECRET_3: ${{ secrets.YOUTUBE_CLIENT_SECRET_3 }}
          YOUTUBE_REFRESH_TOKEN_3: ${{ secrets.YOUTUBE_REFRESH_TOKEN_3 }}
          YOUTUBE_CLIENT_ID_4: ${{ secrets.YOUTUBE_CLIENT_ID_4 }}
          YOUTUBE_CLIENT_SECRET_4: ${{ secrets.YOUTUBE_CLIENT_SECRET_4 }}
          YOUTUBE_REFRESH_TOKEN_4: ${{ secrets.YOUTUBE_REFRESH_TOKEN_4 }}
          YOUTUBE_CLIENT_ID_5: ${{ secrets.YOUTUBE_CLIENT_ID_5 }}
          YOUTUBE_CLIENT_SECRET_5: ${{ secrets.YOUTUBE_CLIENT_SECRET_5 }}
          YOUTUBE_REFRESH_TOKEN_5: ${{ secrets.YOUTUBE_REFRESH_TOKEN_5 }}
          YOUTUBE_CLIENT_ID_6: ${{ secrets.YOUTUBE_CLIENT_ID_6 }}
          YOUTUBE_CLIENT_SECRET_6: ${{ secrets.YOUTUBE_CLIENT_SECRET_6 }}
          YOUTUBE_REFRESH_TOKEN_6: ${{ secrets.YOUTUBE_REFRESH_TOKEN_6 }}
          YOUTUBE_CLIENT_ID_7: ${{ secrets.YOUTUBE_CLIENT_ID_7 }}
          YOUTUBE_CLIENT_SECRET_7: ${{ secrets.YOUTUBE_CLIENT_SECRET_7 }}
          YOUTUBE_REFRESH_TOKEN_7: ${{ secrets.YOUTUBE_REFRESH_TOKEN_7 }}
          YOUTUBE_CLIENT_ID_8: ${{ secrets.YOUTUBE_CLIENT_ID_8 }}
          YOUTUBE_CLIENT_SECRET_8: ${{ secrets.YOUTUBE_CLIENT_SECRET_8 }}
          YOUTUBE_REFRESH_TOKEN_8: ${{ secrets.YOUTUBE_REFRESH_TOKEN_8 }}
          YOUTUBE_CLIENT_ID_9: ${{ secrets.YOUTUBE_CLIENT_ID_9 }}
          YOUTUBE_CLIENT_SECRET_9: ${{ secrets.YOUTUBE_CLIENT_SECRET_9 }}
          YOUTUBE_REFRESH_TOKEN_9: ${{ secrets.YOUTUBE_REFRESH_TOKEN_9 }}
          YOUTUBE_CLIENT_ID_10: ${{ secrets.YOUTUBE_CLIENT_ID_10 }}
          YOUTUBE_CLIENT_SECRET_10: ${{ secrets.YOUTUBE_CLIENT_SECRET_10 }}
          YOUTUBE_REFRESH_TOKEN_10: ${{ secrets.YOUTUBE_REFRESH_TOKEN_10 }}
          YOUTUBE_CLIENT_ID_11: ${{ secrets.YOUTUBE_CLIENT_ID_11 }}
          YOUTUBE_CLIENT_SECRET_11: ${{ secrets.YOUTUBE_CLIENT_SECRET_11 }}
          YOUTUBE_REFRESH_TOKEN_11: ${{ secrets.YOUTUBE_REFRESH_TOKEN_11 }}
          YOUTUBE_CLIENT_ID_12: ${{ secrets.YOUTUBE_CLIENT_ID_12 }}
          YOUTUBE_CLIENT_SECRET_12: ${{ secrets.YOUTUBE_CLIENT_SECRET_12 }}
          YOUTUBE_REFRESH_TOKEN_12: ${{ secrets.YOUTUBE_REFRESH_TOKEN_12 }}
          YOUTUBE_CLIENT_ID_13: ${{ secrets.YOUTUBE_CLIENT_ID_13 }}
          YOUTUBE_CLIENT_SECRET_13: ${{ secrets.YOUTUBE_CLIENT_SECRET_13 }}
          YOUTUBE_REFRESH_TOKEN_13: ${{ secrets.YOUTUBE_REFRESH_TOKEN_13 }}
          YOUTUBE_CLIENT_ID_14: ${{ secrets.YOUTUBE_CLIENT_ID_14 }}
          YOUTUBE_CLIENT_SECRET_14: ${{ secrets.YOUTUBE_CLIENT_SECRET_14 }}
          YOUTUBE_REFRESH_TOKEN_14: ${{ secrets.YOUTUBE_REFRESH_TOKEN_14 }}
          YOUTUBE_CLIENT_ID_15: ${{ secrets.YOUTUBE_CLIENT_ID_15 }}
          YOUTUBE_CLIENT_SECRET_15: ${{ secrets.YOUTUBE_CLIENT_SECRET_15 }}
          YOUTUBE_REFRESH_TOKEN_15: ${{ secrets.YOUTUBE_REFRESH_TOKEN_15 }}
          YOUTUBE_CLIENT_ID_16: ${{ secrets.YOUTUBE_CLIENT_ID_16 }}
          YOUTUBE_CLIENT_SECRET_16: ${{ secrets.YOUTUBE_CLIENT_SECRET_16 }}
          YOUTUBE_REFRESH_TOKEN_16: ${{ secrets.YOUTUBE_REFRESH_TOKEN_16 }}

      - name: Notify Discord on Success
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -H "Content-Type: application/json" -X POST -d '{"content": "✅ **Preview Generator Success**: Shard **0** batch run succeeded!\n**Run URL**: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' "$DISCORD_WEBHOOK_URL"
          else
            echo "Discord Webhook URL not set, skipping notification."
          fi

      - name: Notify Discord on Failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -H "Content-Type: application/json" -X POST -d '{"content": "❌ **Preview Generator Failure**: Shard **0** batch run failed!\n**Run URL**: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' "$DISCORD_WEBHOOK_URL"
          else
            echo "Discord Webhook URL not set, skipping notification."
          fi

