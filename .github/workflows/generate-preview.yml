name: Generate Novel Preview Video

on:
  workflow_dispatch:
    inputs:
      bookId:
        description: 'The Database ID of the book'
        required: true
        type: string
      uploadToYoutube:
        description: 'Automatically upload the generated video to YouTube'
        required: false
        type: boolean
        default: false
      privacyStatus:
        description: 'YouTube Video Privacy Status (public, unlisted, private)'
        required: false
        type: string
        default: 'public'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        run: |
          pnpm install

      - name: Create Env File
        run: |
          echo "TURSO_CONNECTION_URL=${{ secrets.TURSO_CONNECTION_URL }}" > .env.local
          echo "TURSO_AUTH_TOKEN=${{ secrets.TURSO_AUTH_TOKEN }}" >> .env.local
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env.local
        working-directory: ./

      - name: Run Video Generator
        run: |
          pnpm run generate --book ${{ github.event.inputs.bookId }}
        working-directory: ./

      - name: Auto-Upload to YouTube
        if: ${{ github.event.inputs.uploadToYoutube == true || github.event.inputs.uploadToYoutube == 'true' }}
        run: |
          pnpm run upload-youtube --book ${{ github.event.inputs.bookId }} --privacy ${{ github.event.inputs.privacyStatus }}
        working-directory: ./
        env:
          YOUTUBE_CREDS_JSON: ${{ secrets.YOUTUBE_CREDS_JSON }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID_2: ${{ secrets.YOUTUBE_CLIENT_ID_2 }}
          YOUTUBE_CLIENT_SECRET_2: ${{ secrets.YOUTUBE_CLIENT_SECRET_2 }}
          YOUTUBE_REFRESH_TOKEN_2: ${{ secrets.YOUTUBE_REFRESH_TOKEN_2 }}
          YOUTUBE_CLIENT_ID_3: ${{ secrets.YOUTUBE_CLIENT_ID_3 }}
          YOUTUBE_CLIENT_SECRET_3: ${{ secrets.YOUTUBE_CLIENT_SECRET_3 }}
          YOUTUBE_REFRESH_TOKEN_3: ${{ secrets.YOUTUBE_REFRESH_TOKEN_3 }}

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: book-${{ github.event.inputs.bookId }}-preview-video
          path: |
            output/${{ github.event.inputs.bookId }}-preview.mp4
            temp/${{ github.event.inputs.bookId }}
          retention-days: 5
